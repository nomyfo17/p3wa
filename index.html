<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <title>PassGen Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <h2>PassGen App</h2>
        <div class="input-group">
            <label>Length:</label>
            <input type="number" id="length" value="16" min="4" max="64">
        </div>
        <div class="checkbox-group">
            <label><input type="checkbox" id="upper" checked> Uppercase</label>
            <label><input type="checkbox" id="lower" checked> Lowercase</label>
            <label><input type="checkbox" id="numbers" checked> Numbers</label>
            <label><input type="checkbox" id="symbols" checked> Symbols</label>
        </div>
        <button id="generateBtn">Generate</button>
        <div class="result-area">
            <div id="passwordDisplay">********</div>
            <button id="copyBtn" class="secondary-btn">Copy</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Registers the service worker to make it a Web App
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
